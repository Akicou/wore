name: Release (Windows)

# Builds a native Windows installer on version tags.
# Create a release: git tag v0.1.0 && git push origin v0.1.0
#
# Also triggers a managed build on Nayhein Builder (build.nayhein.com) so the
# build shows up in the Builder dashboard with downloadable artifacts.
# The API key lives in the `NAYHEIN_BUILDER_API_KEY` repo secret.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build Tauri app (MSI + NSIS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WoRe ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: wore-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Trigger Nayhein Builder build
        continue-on-error: true
        env:
          NAYHEIN_BUILDER_API_KEY: ${{ secrets.NAYHEIN_BUILDER_API_KEY }}
        run: |
          echo "Submitting build to Nayhein Builder…"
          response=$(curl -sS -X POST https://build.nayhein.com/api/builds \
            -H "Authorization: Bearer $NAYHEIN_BUILDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"repoUrl\":\"${{ github.server_url }}/${{ github.repository }}.git\",\"commitSha\":\"${{ github.sha }}\",\"branch\":\"${{ github.ref_name }}\"}")
          echo "$response"
          echo "$response" | grep -q '"status"' \
            && echo "Builder accepted the build." \
            || (echo "Builder did not accept the build." && exit 1)
